openapi: "3.0.3"
info:
  title: Payments Service
  version: "2.0.0"
paths:
  /charges:
    post:
      summary: Create charge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - currency
                - idempotency_key
              properties:
                amount:
                  type: integer
                currency:
                  type: string
                idempotency_key:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  charge_id:
                    type: string
                  status:
                    type: string
