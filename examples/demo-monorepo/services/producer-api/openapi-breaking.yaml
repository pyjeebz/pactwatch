openapi: "3.0.3"
info:
  title: User API
  description: Core user management service
  version: "2.0.0"
paths:
  /users:
    get:
      summary: List all users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "404":
          description: Not found
  /admin/settings:
    get:
      summary: Get admin settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme:
                    type: string
                  notifications:
                    type: boolean
                  language:
                    type: string
  /admin/users:
    get:
      summary: Admin user list
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        "201":
          description: Created
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar_url:
          type: string
        role:
          type: string
          enum:
            - user
            - admin
            - moderator
    Order:
      type: object
      required:
        - total
        - currency
      properties:
        total:
          type: integer
        currency:
          type: string
        status:
          type: string
          enum:
            - pending
            - confirmed
            - shipped
